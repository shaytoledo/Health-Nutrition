<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00E0A1"/>
      <stop offset="1" stop-color="#00A37A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square background (iOS/Android friendly) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>

  <!-- Leaf -->
  <g transform="translate(256 256)">
    <!-- Main leaf shape -->
    <path d="M -110 40
             C -110 -80, -10 -150, 120 -110
             C 130 10, 60 110, -60 120
             C -100 120, -120 90, -110 40 Z"
          fill="#FFFFFF" opacity="0.96"/>

    <!-- Leaf vein -->
    <path d="M -90 30 C -40 -40, 40 -90, 110 -100"
          stroke="#00A37A" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.85"/>

    <!-- Side veins -->
    <path d="M -60 10 C -40 -10, -10 -30, 20 -50" stroke="#00A37A" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M -30 40 C -10 20,  30 -10, 60 -30"  stroke="#00A37A" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M  10 70 C  30 50,  60  20, 90 -5"   stroke="#00A37A" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>

    <!-- Small accent circle (nutrient dot) -->
    <circle cx="95" cy="-85" r="14" fill="#FFD166"/>
  </g>

  <!-- Subtle shadow under leaf -->
  <ellipse cx="256" cy="420" rx="120" ry="12" fill="#000000" opacity="0.12"/>
</svg>
